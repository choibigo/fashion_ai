<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Vibe - 서울 지역별 패션 큐레이터</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0d12;
            --chat-bg: #1a1a24;
            --user-msg: #ffffff;
            --user-msg-text: #000000;
            --ai-msg: #272736;
            --ai-msg-text: #e0e0e0;
            --accent: #ff4757; /* 서울의 네온사인 느낌을 주는 포인트 컬러 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 서울의 야경 느낌을 주는 그라데이션 배경 */
            background-image: radial-gradient(circle at top right, #2c1b3d 0%, #0d0d12 60%);
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* 헤더 디자인 */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(26, 26, 36, 0.8);
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 1px;
            font-weight: 700;
        }

        header p {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        /* 채팅 영역 */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-box::-webkit-scrollbar { width: 0; }

        .message {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            word-break: keep-all;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            background-color: var(--ai-msg);
            color: var(--ai-msg-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background-color: var(--user-msg);
            color: var(--user-msg-text);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 지역 추천 태그 (새로 추가됨) */
        .neighborhood-tags {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(26, 26, 36, 0.9);
        }

        .neighborhood-tags::-webkit-scrollbar { display: none; }

        .tag {
            background: rgba(255, 71, 87, 0.1);
            color: var(--accent);
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag:hover {
            background: var(--accent);
            color: #fff;
        }

        /* 입력 영역 */
        .input-area {
            padding: 15px 20px;
            background: rgba(26, 26, 36, 0.95);
            display: flex;
            gap: 10px;
            align-items: center;
            padding-bottom: 25px; /* 모바일 하단 여백 고려 */
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-area button {
            background: var(--accent);
            color: #fff;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s ease;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        /* 타이핑 인디케이터 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px;
            background-color: var(--ai-msg);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            display: none;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <h1>Seoul Vibe</h1>
            <p>서울 로컬 분위기에 맞춘 코디 큐레이션</p>
        </header>

        <main class="chat-box" id="chatBox">
            <div class="message ai-message">
                안녕하세요! 🌃<br>오늘 서울의 어느 동네로 가시나요? 장소를 알려주시면 그 동네 바이브에 딱 맞는 룩을 추천해 드릴게요.
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>

        <div class="neighborhood-tags">
            <div class="tag" onclick="setInput('이번 주말 성수동 팝업스토어 갈 건데 뭐 입지?')">#성수동</div>
            <div class="tag" onclick="setInput('한남동 카페 갈 때 입을 깔끔한 옷 추천해줘')">#한남동</div>
            <div class="tag" onclick="setInput('금요일 밤 홍대 갈 건데 힙하게 입고 싶어')">#홍대</div>
            <div class="tag" onclick="setInput('압구정 로데오에서 저녁 약속 있어')">#압구정</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="예: 한남동 데이트 갈 건데 코디 추천해줘" autocomplete="off">
            <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // 퀵 태그 클릭 시 인풋 창에 텍스트 입력
        function setInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            msgDiv.innerHTML = text; 
            
            chatBox.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 서울 지역별 키워드에 따른 맞춤형 가짜 답변 생성
        function getMockAiResponse(userText) {
            if (userText.includes('성수')) {
                return "성수동이군요! 성수는 힙하고 개성 있는 스트릿 캐주얼이 찰떡이에요. 빈티지한 워싱 데님에 오버핏 레더 자켓이나 나일론 아우터를 걸치고, 볼드한 헤드폰이나 키링으로 포인트를 주면 성수 팝업스토어 룩 완성입니다. 🎧🖤";
            } else if (userText.includes('한남') || userText.includes('이태원')) {
                return "한남동 특유의 여유롭고 고급스러운 무드에는 '미니멀룩'이나 '올드머니룩'을 추천해요. 로고가 없는 깔끔한 니트나 가디건에 핏이 좋은 슬랙스, 그리고 로퍼를 매치해 보세요. 색상은 차분한 뉴트럴 톤이 분위기 있어 보입니다. ☕🤎";
            } else if (userText.includes('홍대') || userText.includes('연남')) {
                return "홍대와 연남동은 자유롭고 트렌디한 바이브죠! Y2K 무드의 크롭 탑이나 나일론 카고 팬츠, 그리고 청키한 스니커즈 조합을 추천해요. 비니나 실버 악세사리를 더하면 눈길을 끄는 룩이 될 거예요. 🛹🔥";
            } else if (userText.includes('압구정') || userText.includes('강남') || userText.includes('청담')) {
                return "압구정/청담 라인이라면 세련되고 시크한 룩이 어울려요. 핏이 딱 떨어지는 트위드 자켓이나 미니멀한 셋업 수트에 스틸레토 힐이나 깔끔한 첼시 부츠를 매치해 보세요. 전체적인 실루엣을 깔끔하게 가져가는 것이 포인트입니다. 🥂✨";
            } else {
                return "좋습니다! 가시는 동네 이름(예: 성수, 홍대, 한남, 압구정 등)을 함께 알려주시면, 그 동네의 분위기에 맞춰서 더욱 찰떡같은 스타일링을 추천해 드릴게요! 🗺️👗";
            }
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            typingIndicator.style.display = 'flex';
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                addMessage(getMockAiResponse(text), 'ai');
            }, 1200);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
